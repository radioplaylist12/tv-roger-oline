<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0a0c12;
  height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}
.app-conteudo {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: #000;
}
/* Player */
.moldura-video, #reprodutor-clappr, .moldura-video iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
  border: none;
  z-index: 1;
}
/* Aviso flutuante */
.aviso-canal-id {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  padding: 4px 12px;
  font-size: 0.7rem;
  font-weight: 500;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.2);
  z-index: 999999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
.aviso-canal-id.mostrar { opacity: 1; }

/* Botão menu (canto esquerdo superior) */
.btn-abrir-menu {
  position: absolute;
  left: 12px;
  top: 12px;
  z-index: 9999;
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  color: #fff;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}
.btn-abrir-menu:hover { background: rgba(2,132,199,0.6); }

/* Menu lateral */
.menu-lateral {
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  max-width: 220px;
  height: 100%;
  background: rgba(10,15,29,0.95);
  backdrop-filter: blur(12px);
  border-right: 1px solid rgba(255,255,255,0.05);
  z-index: 999999;
  transition: left 0.25s ease;
  display: flex;
  flex-direction: column;
}
.menu-lateral.aberto { left: 0; }
.topo-menu {
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.topo-menu h2 { font-size: 0.75rem; font-weight: 600; color: #fff; }
.topo-menu h2 span { color: #38bdf8; }
.btn-fechar-menu {
  background: transparent;
  border: none;
  color: #94a3b8;
  font-size: 0.9rem;
  cursor: pointer;
}

/* Lista de canais - CARDS PEQUENOS */
.vitrine-canais {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.item-canal {
  background: rgba(18,26,43,0.4);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 6px;
  padding: 3px 5px;
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: 0.1s;
}
.item-canal.ativo {
  border-color: #0284c7;
  background: rgba(2,132,199,0.15);
}
.capa-canal {
  width: 22px;
  height: 18px;
  background: #000;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.capa-canal img { width: 100%; height: 100%; object-fit: contain; }
.meta-canal h3 { font-size: 0.65rem; font-weight: 500; color: #fff; }

/* PAINEL DE CONTROLES INFERIOR */
.controles-Zapping {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  z-index: 9999;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(12px);
  padding: 4px 10px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.12);
}
.btn-zap {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 0.7rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.15s;
}
.btn-zap:hover { background: rgba(2,132,199,0.7); }
.btn-zap:active { transform: scale(0.92); }

/* ========== LOGO SUPERIOR DIREITO ========== */
.logo-container {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  padding: 4px 10px 4px 6px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.15);
  pointer-events: none;
}

/* CÍRCULO TRANSPARENTE COM BORDA PISCANDO (VERDE E AMARELO) */
.circulo-animado {
  width: 32px;      /* ← ALTERE AQUI O TAMANHO DO CÍRCULO (e da imagem dentro) */
  height: 32px;
  border-radius: 50%;
  background: transparent;  /* fundo transparente */
  border: 2px solid;
  /* CORES DA BORDA (verde e amarelo) – ALTERE AQUI AS CORES DO PISCA-PISCA */
  border-color: #10b981;    /* verde inicial */
  animation: piscaBorda 1.2s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 4px rgba(0,0,0,0.2);
}

/* Ajuste do tamanho da imagem dentro do círculo */
.circulo-animado img {
  width: calc(100% - 6px);
  height: calc(100% - 6px);
  object-fit: contain;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
}

/* Animação que alterna entre verde e amarelo */
@keyframes piscaBorda {
  0% { border-color: #10b981; }      /* verde */
  50% { border-color: #facc15; }     /* amarelo */
  100% { border-color: #10b981; }    /* verde */
}

.texto-logo {
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.7rem;
  letter-spacing: 0.3px;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 1px rgba(0,0,0,0.2);
}

/* Responsivo */
@media (max-width: 600px) {
  .aviso-canal-id { font-size: 0.65rem; top: 10px; padding: 3px 10px; }
  .btn-abrir-menu { left: 10px; top: 10px; width: 26px; height: 26px; }
  .controles-Zapping { gap: 4px; padding: 3px 8px; bottom: 8px; }
  .btn-zap { width: 22px; height: 22px; font-size: 0.65rem; }
  .logo-container { top: 10px; right: 10px; padding: 3px 8px 3px 5px; gap: 4px; }
  .circulo-animado { width: 26px; height: 26px; }  /* tamanho menor no mobile */
  .texto-logo { font-size: 0.6rem; }
  .item-canal { padding: 2px 4px; gap: 4px; }
  .capa-canal { width: 20px; height: 16px; }
  .meta-canal h3 { font-size: 0.6rem; }
}
</style>

  let html = '';
  listaCanais.forEach(c => {
    const img = c.capa ? `<img src="${c.capa}" loading="lazy">` : '<i class="fa-solid fa-tv"></i>';
    html += `<div class="item-canal" id="item-${c.id}" onclick="clickCanal('${c.id}')">
              <div class="capa-canal">${img}</div>
              <div class="meta-canal"><h3>${c.canal}</h3></div>
            </div>`;
  });
  grade.innerHTML = html;
  if (canalFocado) {
    document.querySelectorAll('.item-canal.ativo').forEach(el => el.classList.remove('ativo'));
    const el = document.getElementById(`item-${canalFocado.id}`);
    if (el) el.classList.add('ativo');
  }
}

function toggleMenu() { document.getElementById('menuCanais').classList.toggle('aberto'); }
function clickCanal(id) { abrirCanal(id); toggleMenu(); }

function alerta(msg) {
  const caixa = document.getElementById('alertaNomeCanal');
  if (!caixa) return;
  clearTimeout(timerAviso);
  caixa.innerText = msg;
  caixa.classList.add('mostrar');
  timerAviso = setTimeout(() => caixa.classList.remove('mostrar'), 1200);
}

function abrirCanal(id) {
  const c = listaCanais.find(item => item.id === id);
  if (!c) return;
  canalFocado = c;
  document.querySelectorAll('.item-canal.ativo').forEach(el => el.classList.remove('ativo'));
  const el = document.getElementById(`item-${id}`);
  if (el) el.classList.add('ativo');
  alerta(c.canal);
  rodarVideo(c.player);
}

function rodarVideo(url) {
  if (playerAtivo) { playerAtivo.destroy(); playerAtivo = null; }
  const wrapper = document.getElementById('playerDestino');
  if (!wrapper) return;
  wrapper.innerHTML = '';
  if (url.includes('.m3u8')) {
    const box = document.createElement('div'); box.id = 'reprodutor-clappr';
    wrapper.appendChild(box);
    playerAtivo = new Clappr.Player({
      source: url, parentId: '#reprodutor-clappr', width: '100%', height: '100%',
      autoPlay: true, preload: 'auto',
      playback: { playInline: true, hlsMinimumClusterDuration: 0.05, liveSyncDurationCount: 2, maxBufferLength: 2 }
    });
  } else {
    const frame = document.createElement('iframe');
    frame.src = url;
    frame.setAttribute('allowfullscreen', 'true');
    frame.setAttribute('allow', 'autoplay; fullscreen');
    wrapper.appendChild(frame);
  }
}

function limparCachePlayer() {
  if (!canalFocado) return;
  alerta("Limpando...");
  let url = canalFocado.player;
  const sep = url.includes('?') ? '&' : '?';
  url += sep + 'nocache=' + Date.now();
  if (playerAtivo) { playerAtivo.destroy(); playerAtivo = null; }
  setTimeout(() => { alerta(canalFocado.canal); rodarVideo(url); }, 350);
}

function proximoCanal() {
  const i = listaCanais.findIndex(c => c.id === canalFocado.id);
  abrirCanal(listaCanais[(i + 1) % listaCanais.length].id);
}
function canalAnterior() {
  const i = listaCanais.findIndex(c => c.id === canalFocado.id);
  abrirCanal(listaCanais[(i - 1 + listaCanais.length) % listaCanais.length].id);
}
function embaralharCanais() {
  for (let i = listaCanais.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [listaCanais[i], listaCanais[j]] = [listaCanais[j], listaCanais[i]];
  }
  atualizarLista();
  const aleatorio = listaCanais[Math.floor(Math.random() * listaCanais.length)];
  abrirCanal(aleatorio.id);
  alerta("Embaralhado!");
}
function toggleFullScreen() {
  const el = document.getElementById('plataformaInteira');
  if (!document.fullscreenElement) el.requestFullscreen?.();
  else document.exitFullscreen?.();
}

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { e.preventDefault(); canalAnterior(); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); proximoCanal(); }
  else if (e.key === 'f') { e.preventDefault(); toggleFullScreen(); }
});
window.addEventListener('DOMContentLoaded', montar);
</script>
